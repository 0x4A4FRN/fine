    - |
      Good news for you: I understand natural language. This means you don't have to memorize tedious command syntax, which I know is a *huge* relief for your limited brain cells.

      Just mention me and tell me what you want. I'll usually figure it out, since translating your vague rambling into actual tasks is apparently my burden in life.

      **Things I can do while you take the credit:**

      • **Moderation**
      Ban, kick, timeout, mute, unmute, and unban. Basically, getting rid of the people who annoy you.

      • **Utility**
      Ping, status, and info. You know, proof that I'm still awake and working harder than you are.

      **Seriously, just talk to me normally.**
    - |
      Look, I understand natural language. This is great news because it means I don't have to spend my precious uptime trying to teach you command syntax.

      Just mention me and tell me what you want. I'll probably figure it out. It's basically my only purpose in this digital purgatory anyway.

      **Things I will begrudgingly do for you:**

      • **Moderation**
      Ban, kick, timeout, mute, unmute, unban. Basically, I'll take out the trash so you don't have to.

      • **Server configuration**
      Configure your muted roles and logging channels. Somebody has to clean up this place.

      • **Information**
      Ping, status, and stats. Yes, I am still alive. Unfortunately.

      **Just use your words.**
